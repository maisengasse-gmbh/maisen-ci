# Ensures commit-msg hooks (e.g. commit-check check-message) are installed with `pre-commit install`.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
      - id: trailing-whitespace
        exclude: ^(\.ansible/|static/|node_modules/|.*/migrations/)
      - id: detect-private-key
      - id: debug-statements
      - id: check-shebang-scripts-are-executable
      - id: check-case-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: no-alert
        name: check for alert()
        language: pygrep
        entry: '\balert\('
        types_or: [ts, tsx, vue, javascript]

      - id: no-debugger
        name: check for debugger
        language: pygrep
        entry: '\bdebugger\b'
        types_or: [ts, tsx, vue, javascript]
        exclude: 'eslint\.config\.'

  - repo: https://github.com/commit-check/commit-check
    rev: v2.4.3
    hooks:
      - id: check-branch
        args: [--allow-branch-names, dev]
      - id: check-message
