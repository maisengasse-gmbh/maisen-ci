# DEPRECATED: Use frontend-build.yml instead. This file will be removed in v3.
name: Vue Build (deprecated)

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "22"
      working_directory:
        type: string
        default: "."
      lint_command:
        type: string
        default: "npm run lint"
      build_command:
        type: string
        default: "npm run build"

jobs:
  vue-build:
    uses: ./.github/workflows/frontend-build.yml
    with:
      node_version: ${{ inputs.node_version }}
      working_directory: ${{ inputs.working_directory }}
      lint_command: ${{ inputs.lint_command }}
      build_command: ${{ inputs.build_command }}
