name: Django Lint & Test

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        default: "3.12"
      working_directory:
        type: string
        default: "."
      ruff_args:
        type: string
        default: "check ."
      pytest_args:
        type: string
        default: "--ds settings.test -x"
      postgres_version:
        type: string
        default: "16"
      postgres_image:
        type: string
        default: ""
        description: "Custom PostgreSQL image (e.g. postgis/postgis:16-3.4). Overrides postgres_version."
      cache_image:
        type: string
        default: "valkey/valkey:8-alpine"
        description: "Cache service image (redis or valkey)"
      cache_health_cmd:
        type: string
        default: "valkey-cli ping"
        description: "Health check command for cache service"
      database_url:
        type: string
        default: "postgres://postgres:postgres@localhost:5432/test_db"
      cache_url:
        type: string
        default: "redis://localhost:6379/0"
      project_name:
        type: string
        default: ""
        description: "Django PROJECT_NAME env var"
      project_verbose_name:
        type: string
        default: ""
        description: "Django PROJECT_VERBOSE_NAME env var"
      system_packages:
        type: string
        default: ""
        description: "Additional apt packages to install (space-separated)"
      pip_install_command:
        type: string
        default: ""
        description: "Custom pip install command. If empty, uses 'pip install -r requirements.txt'"
      pre_test_script:
        type: string
        default: ""
        description: "Shell script to run before tests (e.g. start extra services, init data)"
      env_file:
        type: string
        default: ""
        description: "Path to .env file to load into GITHUB_ENV before tests"
      extra_env:
        type: string
        default: ""
        description: "Extra environment variables (KEY=VALUE, one per line)"

jobs:
  lint-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: ${{ inputs.postgres_image || format('postgres:{0}', inputs.postgres_version) }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      cache:
        image: ${{ inputs.cache_image }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "${{ inputs.cache_health_cmd }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        if: inputs.system_packages != ''
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ${{ inputs.system_packages }}

      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ inputs.python_version }}-${{ hashFiles(format('{0}/requirements.txt', inputs.working_directory)) }}
          restore-keys: |
            uv-${{ inputs.python_version }}-

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.pip_install_command || 'uv pip install --system -r requirements.txt' }}

      - name: Install Ruff
        run: uv pip install --system ruff

      - name: Ruff lint
        working-directory: ${{ inputs.working_directory }}
        run: ruff ${{ inputs.ruff_args }}

      - name: Load env file
        if: inputs.env_file != ''
        working-directory: ${{ inputs.working_directory }}
        run: cat "${{ inputs.env_file }}" >> $GITHUB_ENV

      - name: Load extra env
        if: inputs.extra_env != ''
        run: echo "${{ inputs.extra_env }}" >> $GITHUB_ENV

      - name: Pre-test script
        if: inputs.pre_test_script != ''
        run: ${{ inputs.pre_test_script }}

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        env:
          DATABASE_CONNECTION_URL: ${{ inputs.database_url }}
          CACHE_URL: ${{ inputs.cache_url }}
          SECRET_KEY: test-secret-key-for-ci
          PROJECT_NAME: ${{ inputs.project_name }}
          PROJECT_VERBOSE_NAME: ${{ inputs.project_verbose_name }}
          ALLOWED_HOSTS: "*"
          CORS_ORIGIN_WHITELIST: "http://localhost"
          CSRF_TRUSTED_ORIGINS: "http://localhost"
          DEBUG: "False"
          JWT_ALGORITHM: "HS256"
          JWT_SECRET_KEY: test-secret-key-for-ci
        run: pytest ${{ inputs.pytest_args }}
