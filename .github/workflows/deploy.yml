name: Deploy

on:
  workflow_call:
    inputs:
      deploy_path:
        type: string
        required: true
        description: "Absolute path on server"
      compose_files:
        type: string
        default: "-f docker-compose.base.yml -f docker-compose.prod.yml"
        description: "Docker Compose file flags relative to deploy_path (e.g. -f docker/base.yml -f docker/prod.yml)"
      compose_source_files:
        type: string
        default: ""
        description: "Space-separated compose files in repo to SCP to server (e.g. path/to/docker-compose.base.yml path/to/docker-compose.prod.yml)"
      health_check_url:
        type: string
        default: ""
      run_migrations:
        type: boolean
        default: true
      migration_command:
        type: string
        default: "python manage.py migrate --noinput"
      ssh_user:
        type: string
        required: true
      ssh_host:
        type: string
        required: true
      create_tag:
        type: boolean
        default: true
        description: "Create a git tag after successful deploy"
      tag_prefix:
        type: string
        default: "deploy"
        description: "Tag prefix (e.g. deploy → deploy/2026-03-24-a1b2c3d)"
      env_file_path:
        type: string
        default: ".env"
        description: "Path on server (relative to deploy_path) where ENV_FILE secret is written"
      backup_enabled:
        type: boolean
        default: true
        description: "Create a DB backup before running migrations"
      backup_container:
        type: string
        default: "db"
        description: "Docker Compose service name for the database"
      backup_db_user:
        type: string
        default: "postgres"
        description: "Database user for pg_dump"
      backup_db_name:
        type: string
        default: ""
        description: "Database name for pg_dump (empty = skip backup)"
      backup_path:
        type: string
        default: "/tmp/backups"
        description: "Server path for backup files"
      backup_retention_days:
        type: string
        default: "30"
        description: "Delete backups older than N days"
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_KNOWN_HOSTS:
        required: true
      ENV_FILE:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy compose files to server
        if: inputs.compose_source_files != ''
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
        run: |
          ssh $SSH_TARGET "mkdir -p $DEPLOY_PATH"
          for file in ${{ inputs.compose_source_files }}; do
            dir=$(dirname "$file")
            ssh $SSH_TARGET "mkdir -p $DEPLOY_PATH/$dir"
            scp "$file" "$SSH_TARGET:$DEPLOY_PATH/$file"
            echo "Copied $file"
          done

      - name: Write env file to server
        if: inputs.env_file_path != ''
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          ENV_FILE_PATH: ${{ inputs.env_file_path }}
        run: |
          ssh $SSH_TARGET "mkdir -p $DEPLOY_PATH/$(dirname $ENV_FILE_PATH)"
          echo "${{ secrets.ENV_FILE }}" | ssh $SSH_TARGET "cat > $DEPLOY_PATH/$ENV_FILE_PATH"
          echo "Wrote env file to $DEPLOY_PATH/$ENV_FILE_PATH"

      - name: Deploy to server
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ inputs.compose_files }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          MIGRATION_CMD: ${{ inputs.migration_command }}
          BACKUP_ENABLED: ${{ inputs.backup_enabled }}
          BACKUP_CONTAINER: ${{ inputs.backup_container }}
          BACKUP_DB_USER: ${{ inputs.backup_db_user }}
          BACKUP_DB_NAME: ${{ inputs.backup_db_name }}
          BACKUP_PATH: ${{ inputs.backup_path }}
          BACKUP_RETENTION_DAYS: ${{ inputs.backup_retention_days }}
        run: |
          ssh $SSH_TARGET << ENDSSH
            set -e
            cd $DEPLOY_PATH

            echo "Pulling latest images..."
            docker compose $COMPOSE_FILES pull

            echo "Starting containers..."
            docker compose $COMPOSE_FILES up -d

            echo "Waiting for services to start..."
            sleep 10

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Containers started!"
            docker compose $COMPOSE_FILES ps
          ENDSSH

      - name: Pre-deploy backup
        if: inputs.backup_enabled && inputs.backup_db_name != ''
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ inputs.compose_files }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          BACKUP_FILE="${{ inputs.backup_path }}/${{ inputs.backup_db_name }}_pre-deploy_${TIMESTAMP}.dump"
          ssh $SSH_TARGET "mkdir -p ${{ inputs.backup_path }}"
          ssh $SSH_TARGET "cd $DEPLOY_PATH && docker compose $COMPOSE_FILES exec -T ${{ inputs.backup_container }} pg_dump -U ${{ inputs.backup_db_user }} -Fc ${{ inputs.backup_db_name }}" > /tmp/backup.dump
          scp /tmp/backup.dump "$SSH_TARGET:$BACKUP_FILE"
          ssh $SSH_TARGET "find ${{ inputs.backup_path }} -name '${{ inputs.backup_db_name }}_pre-deploy_*' -mtime +${{ inputs.backup_retention_days }} -delete"
          echo "Backup created: $BACKUP_FILE"

      - name: Run migrations
        if: inputs.run_migrations
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ inputs.compose_files }}
          MIGRATION_CMD: ${{ inputs.migration_command }}
        run: |
          ssh $SSH_TARGET "cd $DEPLOY_PATH && docker compose $COMPOSE_FILES exec -T backend $MIGRATION_CMD"

      - name: Collect static files
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ inputs.compose_files }}
        run: |
          ssh $SSH_TARGET "cd $DEPLOY_PATH && docker compose $COMPOSE_FILES exec -T backend python manage.py collectstatic --noinput"

      - name: Health check
        if: inputs.health_check_url != ''
        run: |
          echo "Running health check..."
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 ${{ inputs.health_check_url }} || echo "000")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "Health check warning (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Create deploy tag
        if: inputs.create_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG_NAME="${{ inputs.tag_prefix }}/$(date -u +%Y-%m-%d)-${SHORT_SHA}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Tagged: $TAG_NAME"
