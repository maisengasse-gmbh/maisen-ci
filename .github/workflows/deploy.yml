name: Deploy

on:
  workflow_call:
    inputs:
      deploy_path:
        type: string
        required: true
        description: "Absolute path on server"
      compose_source_files:
        type: string
        required: true
        description: "Space-separated compose files to SCP and use (e.g. docker/docker-compose.base.yml docker/docker-compose.prod.yml)"
      health_check_url:
        type: string
        default: ""
      backend_container:
        type: string
        default: "backend"
        description: "Docker Compose service name for the app container (readiness check + command execution)"
      migration_command:
        type: string
        default: ""
        description: "Migration command to run in backend_container. Empty = skip. (e.g. 'python manage.py migrate --noinput')"
      post_deploy_commands:
        type: string
        default: ""
        description: "Newline-separated commands to run in backend_container after migrations. Empty = skip. (e.g. 'python manage.py collectstatic --noinput')"
      ssh_user:
        type: string
        required: true
      ssh_host:
        type: string
        required: true
      create_tag:
        type: boolean
        default: true
        description: "Create a git tag after successful deploy"
      tag_prefix:
        type: string
        default: "deploy"
        description: "Tag prefix (e.g. deploy → deploy/2026-03-24-a1b2c3d)"
      env_file_path:
        type: string
        default: ".env"
        description: "Path on server (relative to deploy_path) where ENV_FILE secret is written"
      backup_command:
        type: string
        default: ""
        description: "Full backup command run via SSH on server. Empty = skip. Output piped to backup file. (e.g. 'docker exec $(docker compose ps -q db) pg_dump -U myuser -Fc mydb')"
      backup_path:
        type: string
        default: "/tmp/backups"
        description: "Server path for backup files"
      backup_retention_days:
        type: string
        default: "30"
        description: "Delete backups older than N days"
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_KNOWN_HOSTS:
        required: true
      ENV_FILE:
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Build compose flags
        id: compose
        run: |
          FLAGS="--env-file ${{ inputs.env_file_path }}"
          for file in ${{ inputs.compose_source_files }}; do
            FLAGS="$FLAGS -f $file"
          done
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT
          echo "Compose flags: $FLAGS"

      - name: Copy compose files to server
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
        run: |
          ssh $SSH_TARGET "mkdir -p $DEPLOY_PATH"
          for file in ${{ inputs.compose_source_files }}; do
            dir=$(dirname "$file")
            ssh $SSH_TARGET "mkdir -p $DEPLOY_PATH/$dir"
            scp "$file" "$SSH_TARGET:$DEPLOY_PATH/$file"
            echo "Copied $file"
          done

      - name: Write env file to server
        if: inputs.env_file_path != ''
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          ENV_FILE_PATH: ${{ inputs.env_file_path }}
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s' "$ENV_FILE_CONTENT" > /tmp/.env.deploy
          ssh $SSH_TARGET "mkdir -p $DEPLOY_PATH/$(dirname $ENV_FILE_PATH)"
          scp /tmp/.env.deploy "$SSH_TARGET:$DEPLOY_PATH/$ENV_FILE_PATH"
          rm -f /tmp/.env.deploy
          echo "Wrote env file to $DEPLOY_PATH/$ENV_FILE_PATH"

      - name: Pre-deploy backup
        if: inputs.backup_command != ''
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          BACKUP_CMD: ${{ inputs.backup_command }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          BACKUP_FILE="${{ inputs.backup_path }}/pre-deploy_${TIMESTAMP}.dump"
          ssh $SSH_TARGET "mkdir -p ${{ inputs.backup_path }}"
          ssh $SSH_TARGET "cd $DEPLOY_PATH && $BACKUP_CMD" > /tmp/backup.dump
          scp /tmp/backup.dump "$SSH_TARGET:$BACKUP_FILE"
          rm -f /tmp/backup.dump
          ssh $SSH_TARGET "find ${{ inputs.backup_path }} -name 'pre-deploy_*' -mtime +${{ inputs.backup_retention_days }} -delete"
          echo "Backup created: $BACKUP_FILE"

      - name: Deploy to server
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ steps.compose.outputs.flags }}
        run: |
          ssh $SSH_TARGET << ENDSSH
            set -e
            cd $DEPLOY_PATH

            echo "Pulling latest images..."
            docker compose $COMPOSE_FILES pull

            echo "Starting containers..."
            docker compose $COMPOSE_FILES up -d

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Waiting for backend container to be ready..."
            for i in \$(seq 1 30); do
              STATUS=\$(docker compose $COMPOSE_FILES ps --format '{{.State}}' ${{ inputs.backend_container }} 2>/dev/null || echo "unknown")
              if [ "\$STATUS" = "running" ]; then
                echo "Backend container is running (attempt \$i/30)"
                break
              fi
              if [ "\$STATUS" = "restarting" ] || [ "\$STATUS" = "exited" ] || [ "\$STATUS" = "dead" ]; then
                echo "Backend container failed with status: \$STATUS"
                echo "=== Container Logs ==="
                docker compose $COMPOSE_FILES logs --tail=50 ${{ inputs.backend_container }}
                exit 1
              fi
              echo "Waiting for backend... (attempt \$i/30, status: \$STATUS)"
              sleep 2
            done

            if [ "\$STATUS" != "running" ]; then
              echo "Backend container did not become ready in time (status: \$STATUS)"
              echo "=== Container Logs ==="
              docker compose $COMPOSE_FILES logs --tail=50 ${{ inputs.backend_container }}
              exit 1
            fi

            docker compose $COMPOSE_FILES ps
          ENDSSH

      - name: Run migrations
        if: inputs.migration_command != ''
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ steps.compose.outputs.flags }}
          MIGRATION_CMD: ${{ inputs.migration_command }}
          CONTAINER: ${{ inputs.backend_container }}
        run: |
          ssh $SSH_TARGET "cd $DEPLOY_PATH && docker compose $COMPOSE_FILES exec -T $CONTAINER $MIGRATION_CMD" || {
            echo "=== Migration failed - Container Logs ==="
            ssh $SSH_TARGET "cd $DEPLOY_PATH && docker compose $COMPOSE_FILES logs --tail=50 $CONTAINER"
            exit 1
          }

      - name: Post-deploy commands
        if: inputs.post_deploy_commands != ''
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ steps.compose.outputs.flags }}
          CONTAINER: ${{ inputs.backend_container }}
          COMMANDS: ${{ inputs.post_deploy_commands }}
        run: |
          echo "$COMMANDS" | while IFS= read -r cmd; do
            [ -z "$cmd" ] && continue
            echo "Running: $cmd"
            ssh $SSH_TARGET "cd $DEPLOY_PATH && docker compose $COMPOSE_FILES exec -T $CONTAINER $cmd" || {
              echo "=== Command failed: $cmd ==="
              ssh $SSH_TARGET "cd $DEPLOY_PATH && docker compose $COMPOSE_FILES logs --tail=50 $CONTAINER"
              exit 1
            }
          done

      - name: Health check
        if: inputs.health_check_url != ''
        run: |
          echo "Running health check..."
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 ${{ inputs.health_check_url }} || echo "000")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "Health check warning (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Create deploy tag
        if: inputs.create_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG_NAME="${{ inputs.tag_prefix }}/$(date -u +%Y-%m-%d)-${SHORT_SHA}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Tagged: $TAG_NAME"
