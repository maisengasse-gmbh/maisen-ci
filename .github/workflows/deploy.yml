name: Deploy

on:
  workflow_call:
    inputs:
      deploy_path:
        type: string
        required: true
        description: "Absolute path on server"
      compose_files:
        type: string
        default: "-f docker-compose.base.yml -f docker-compose.prod.yml"
        description: "Docker Compose file flags (e.g. -f base.yml -f prod.yml)"
      health_check_url:
        type: string
        default: ""
      run_migrations:
        type: boolean
        default: true
      migration_command:
        type: string
        default: "python manage.py migrate --noinput"
      ssh_user:
        type: string
        required: true
      ssh_host:
        type: string
        required: true
      create_tag:
        type: boolean
        default: true
        description: "Create a git tag after successful deploy"
      tag_prefix:
        type: string
        default: "deploy"
        description: "Tag prefix (e.g. deploy → deploy/2026-03-24-a1b2c3d)"
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_KNOWN_HOSTS:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        if: inputs.create_tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          SSH_TARGET: ${{ inputs.ssh_user }}@${{ inputs.ssh_host }}
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          COMPOSE_FILES: ${{ inputs.compose_files }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          MIGRATION_CMD: ${{ inputs.migration_command }}
        run: |
          ssh $SSH_TARGET << ENDSSH
            set -e
            cd $DEPLOY_PATH

            echo "Pulling latest images..."
            docker compose $COMPOSE_FILES pull

            echo "Starting containers..."
            docker compose $COMPOSE_FILES up -d

            echo "Waiting for services to start..."
            sleep 10

            if [ "$RUN_MIGRATIONS" = "true" ]; then
              echo "Running migrations..."
              docker compose $COMPOSE_FILES exec -T backend $MIGRATION_CMD
            fi

            echo "Collecting static files into volume..."
            docker compose $COMPOSE_FILES exec -T backend python manage.py collectstatic --noinput

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment complete!"
            docker compose $COMPOSE_FILES ps
          ENDSSH

      - name: Health check
        if: inputs.health_check_url != ''
        run: |
          echo "Running health check..."
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 ${{ inputs.health_check_url }} || echo "000")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "302" ]; then
            echo "Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "Health check warning (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Create deploy tag
        if: inputs.create_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG_NAME="${{ inputs.tag_prefix }}/$(date -u +%Y-%m-%d)-${SHORT_SHA}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "Tagged: $TAG_NAME"
